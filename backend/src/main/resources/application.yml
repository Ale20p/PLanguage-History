spring:
  application:
    name: planguage-history

  # ── PostgreSQL Connection (matches docker-compose.yml) ──
  datasource:
    url: jdbc:postgresql://localhost:5434/planguage_history
    username: planguage_admin
    password: planguage_dev_2026
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: validate   # Schema is managed by schema.sql, not Hibernate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081
